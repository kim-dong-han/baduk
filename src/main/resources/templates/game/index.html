<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>1판 복기 분석</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        h1 { font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: #4a90d9; text-decoration: none; font-size: 14px; }

        .error-box { background: #ffe0e0; border: 1px solid #e00; padding: 14px 18px; border-radius: 8px; margin-bottom: 20px; max-width: 680px; font-size: 14px; }

        /* ── 탭 파일 선택 박스 ── */
        .select-box { background: #fff; border-radius: 12px; max-width: 760px; margin: 0 auto 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }

        .tabs { display: flex; border-bottom: 2px solid #f0f2f5; }
        .tab { flex: 1; padding: 14px 0; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; color: #aaa; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; user-select: none; }
        .tab.active { color: #4a90d9; border-bottom-color: #4a90d9; }
        .tab:hover:not(.active) { color: #666; background: #fafafa; }
        .tab-count { font-size: 11px; font-weight: 400; background: #eee; border-radius: 99px; padding: 1px 7px; margin-left: 6px; color: #888; }
        .tab.active .tab-count { background: #d0e8fa; color: #4a90d9; }

        .file-list { max-height: 340px; overflow-y: auto; padding: 8px 0; }
        .file-list::-webkit-scrollbar { width: 5px; }
        .file-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }

        .file-item { padding: 11px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f8f8f8; transition: background 0.1s; }
        .file-item:hover { background: #f5faff; }
        .file-item.selected { background: #e8f4fd; border-left: 3px solid #4a90d9; padding-left: 17px; }
        .file-item:last-child { border-bottom: none; }

        .file-icon { font-size: 16px; flex-shrink: 0; opacity: 0.6; }
        .file-name { font-size: 14px; color: #333; flex: 1; }
        .analyzed-badge { font-size: 11px; background: #d5f5e3; color: #1e8449; padding: 2px 8px; border-radius: 99px; font-weight: 600; white-space: nowrap; }

        .empty-list { color: #bbb; font-size: 14px; text-align: center; padding: 32px 0; }

        .action-bar { padding: 16px 20px; border-top: 1px solid #f0f2f5; display: flex; align-items: center; gap: 12px; }
        .selected-label { font-size: 13px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .selected-label span { color: #333; font-weight: 600; }
        .btn { background: #4a90d9; color: #fff; border: none; border-radius: 8px; padding: 11px 28px; font-size: 14px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .btn:hover { background: #357abd; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* ── 최근 분석 결과 ── */
        .results-section { max-width: 760px; margin: 0 auto; }
        .results-section h2 { font-size: 18px; margin-bottom: 16px; }
        .result-card { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .result-info { flex: 1; min-width: 0; }
        .result-filename { font-size: 14px; font-weight: 600; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .result-meta { font-size: 12px; color: #aaa; }
        .phase-pills { display: flex; gap: 6px; flex-shrink: 0; }
        .pill { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: #f4f4f4; color: #666; }
        .pill.good { background: #d5f5e3; color: #1e8449; }
        .pill.warn { background: #fdebd0; color: #b7770d; }
        .pill.bad  { background: #fadbd8; color: #c0392b; }
        .view-btn { font-size: 13px; color: #4a90d9; text-decoration: none; padding: 6px 14px; border: 1px solid #4a90d9; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
        .view-btn:hover { background: #4a90d9; color: #fff; }
    </style>
</head>
<body>

<nav class="topnav">
    <div class="topnav-inner">
        <a class="brand" href="/analysis/batch">⚫ 바둑 분석</a>
        <div class="topnav-links">
            <a href="/analysis/batch">실력 리포트</a>
            <a href="/game" class="active">기보 복기</a>
        </div>
    </div>
</nav>

<div class="page narrow">
<h1>1판 복기 분석</h1>
<p class="subtitle">기보 한 판을 수별로 분석해 핵심 실수와 최선수를 알려드립니다.</p>

<div th:if="${error}" class="error-box" th:text="${error}"></div>

<div class="select-box">
    <!-- 탭 -->
    <div class="tabs">
        <div class="tab active" id="tabPro" onclick="switchTab('pro')">
            프로기보
            <span class="tab-count" th:text="${#lists.size(proFiles)}"></span>
        </div>
        <div class="tab" id="tabMy" onclick="switchTab('my')">
            나의기보
            <span class="tab-count" th:text="${#lists.size(files)}"></span>
        </div>
    </div>

    <!-- 프로기보 목록 -->
    <div class="file-list" id="listPro">
        <div th:if="${#lists.isEmpty(proFiles)}" class="empty-list">프로기보 없음</div>
        <div th:each="f : ${proFiles}"
             th:data-file="${f}"
             th:class="${resultMap != null and resultMap.containsKey(f) ? 'file-item analyzed' : 'file-item'}"
             onclick="selectFile(this)">
            <span class="file-icon">♟</span>
            <span class="file-name" th:text="${f}"></span>
            <span th:if="${resultMap != null and resultMap.containsKey(f)}" class="analyzed-badge">분석 완료</span>
        </div>
    </div>

    <!-- 나의기보 목록 -->
    <div class="file-list" id="listMy" style="display:none;">
        <div th:if="${#lists.isEmpty(files)}" class="empty-list">나의기보 없음</div>
        <div th:each="f : ${files}"
             th:data-file="${f}"
             th:class="${resultMap != null and resultMap.containsKey(f) ? 'file-item analyzed' : 'file-item'}"
             onclick="selectFile(this)">
            <span class="file-icon">🎯</span>
            <span class="file-name" th:text="${f}"></span>
            <span th:if="${resultMap != null and resultMap.containsKey(f)}" class="analyzed-badge">분석 완료</span>
        </div>
    </div>

    <!-- 하단 액션 바 -->
    <div class="action-bar">
        <div class="selected-label" id="selectedLabel">기보를 선택하세요</div>
        <form method="post" action="/game/analyze" onsubmit="document.getElementById('submitBtn').disabled = true" id="analyzeForm">
            <input type="hidden" name="fileName" id="selectedFile">
            <button class="btn" type="submit" id="submitBtn" disabled>분석 시작</button>
        </form>
    </div>
</div>

<!-- 최근 분석 결과 -->
<div class="results-section" th:if="${not #lists.isEmpty(results)}">
    <h2>최근 분석 결과</h2>
    <div th:each="r : ${results}">
        <div class="result-card">
            <div class="result-info">
                <div class="result-filename" th:text="${r.fileName}"></div>
                <div class="result-meta">
                    <span th:text="${r.analyzedAt != null ? r.analyzedAt.substring(0,10) : ''}"></span>
                    &nbsp;·&nbsp;
                    <span th:text="${r.totalMoves} + '수'"></span>
                </div>
            </div>
            <div class="phase-pills">
                <span th:if="${r.opening != null and r.opening.moveCount > 0}"
                      th:class="${r.opening.avgScoreLoss < 1.5 ? 'pill good' : (r.opening.avgScoreLoss < 3 ? 'pill warn' : 'pill bad')}"
                      th:text="'초반 ' + ${r.opening.avgScoreLoss} + '집'"></span>
                <span th:if="${r.middle != null and r.middle.moveCount > 0}"
                      th:class="${r.middle.avgScoreLoss < 1.5 ? 'pill good' : (r.middle.avgScoreLoss < 3 ? 'pill warn' : 'pill bad')}"
                      th:text="'중반 ' + ${r.middle.avgScoreLoss} + '집'"></span>
                <span th:if="${r.endgame != null and r.endgame.moveCount > 0}"
                      th:class="${r.endgame.avgScoreLoss < 1.5 ? 'pill good' : (r.endgame.avgScoreLoss < 3 ? 'pill warn' : 'pill bad')}"
                      th:text="'종반 ' + ${r.endgame.avgScoreLoss} + '집'"></span>
            </div>
            <a class="view-btn" th:href="'/game/result/' + ${r.id}">결과 보기 →</a>
        </div>
    </div>
</div>

<script>
function switchTab(tab) {
    document.getElementById('tabPro').classList.toggle('active', tab === 'pro');
    document.getElementById('tabMy').classList.toggle('active', tab === 'my');
    document.getElementById('listPro').style.display = tab === 'pro' ? '' : 'none';
    document.getElementById('listMy').style.display  = tab === 'my'  ? '' : 'none';
}

function selectFile(el) {
    const fileName = el.dataset.file;
    document.querySelectorAll('.file-item.selected').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('selectedFile').value = fileName;
    document.getElementById('selectedLabel').innerHTML = '선택: <span>' + fileName + '</span>';
    document.getElementById('submitBtn').disabled = false;
}
</script>
</div>
</body>
</html>

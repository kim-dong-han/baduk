<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>바둑 실력 분석</title>
    <meta th:if="${running}" http-equiv="refresh" content="5">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px 40px; background: #f0f2f5; color: #333; }
        h1 { font-size: 24px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 28px; }

        /* 요약 배너 */
        .summary-banner { background: #fff; border-radius: 12px; padding: 18px 24px; margin-bottom: 24px; max-width: 820px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; gap: 32px; align-items: center; }
        .summary-item { text-align: center; }
        .summary-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .summary-value { font-size: 16px; font-weight: 700; }
        .summary-divider { width: 1px; background: #eee; align-self: stretch; }

        /* 구간 카드 */
        .cards { display: flex; gap: 16px; max-width: 820px; margin-bottom: 24px; }
        .card { flex: 1; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-top: 5px solid #ccc; }
        .card.strong { border-top-color: #2ecc71; }
        .card.normal { border-top-color: #f39c12; }
        .card.weak   { border-top-color: #e74c3c; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .card-phase { font-size: 16px; font-weight: 700; }
        .grade { font-size: 22px; font-weight: 900; }
        .grade.S { color: #8e44ad; }
        .grade.A { color: #2ecc71; }
        .grade.B { color: #27ae60; }
        .grade.C { color: #f39c12; }
        .grade.D { color: #e74c3c; }

        /* 게이지 바 */
        .gauge-label { font-size: 12px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .gauge-track { background: #eee; border-radius: 99px; height: 10px; margin-bottom: 12px; }
        .gauge-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
        .fill-strong { background: #2ecc71; }
        .fill-normal { background: #f39c12; }
        .fill-weak   { background: #e74c3c; }

        .stat-row { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; }
        .stat-row span:last-child { font-weight: 600; color: #333; }

        .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
        .badge.strong { background: #d5f5e3; color: #1e8449; }
        .badge.normal { background: #fdebd0; color: #b7770d; }
        .badge.weak   { background: #fadbd8; color: #c0392b; }

        /* 레이더 차트 */
        .chart-section { background: #fff; border-radius: 12px; padding: 24px; max-width: 820px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .chart-section h2 { font-size: 16px; margin: 0 0 16px; }
        .chart-wrap { max-width: 340px; margin: 0 auto; }

        /* 상세 테이블 */
        .table-section { background: #fff; border-radius: 12px; padding: 24px; max-width: 820px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .table-section h2 { font-size: 16px; margin: 0 0 16px; }
        table { border-collapse: collapse; width: 100%; }
        th { background: #f8f9fa; color: #555; font-size: 13px; padding: 10px 14px; border-bottom: 2px solid #eee; text-align: center; }
        td { padding: 10px 14px; text-align: center; border-bottom: 1px solid #f0f0f0; font-size: 14px; }

        /* 기타 */
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4a90d9; border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { text-align: center; padding: 60px; }
        .error-box { background: #ffe0e0; border: 1px solid #e00; padding: 16px; border-radius: 8px; margin-bottom: 20px; max-width: 820px; }
        .empty { color: #aaa; text-align: center; padding: 40px; }
        .refresh-link { font-size: 13px; color: #4a90d9; text-decoration: none; }
        .tygem-notice { background:#fff; border-radius:8px; padding:14px 20px; margin-bottom:20px; max-width:820px; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-left:4px solid #4a90d9; font-size:13px; color:#555; }
    </style>
</head>
<body>
    <h1>바둑 실력 분석</h1>
    <p class="subtitle">KataGo AI 기반 구간별 기력 리포트</p>

    <div class="tygem-notice">타이젬 자동 연동 중 — 대국 종료 후 기보가 자동으로 분석됩니다.</div>

    <div th:if="${running}" class="loading">
        <div class="spinner"></div>
        <p style="color:#888;">KataGo 분석 중입니다. 잠시만 기다려주세요...</p>
    </div>

    <div th:if="${error}" class="error-box">
        <strong>오류:</strong> <span th:text="${error}"></span>
    </div>

    <!-- 데이터를 JS로 전달 -->
    <script th:if="${userResults != null and #lists.size(userResults) > 0}" th:inline="javascript">
        const userResults = /*[[${userResults}]]*/ [];
    </script>

    <div th:if="${userResults != null and #lists.size(userResults) > 0}" id="analysis-root"></div>

    <p th:if="${(userResults == null or #lists.size(userResults) == 0) and not running}" class="empty">분석 결과가 없습니다. 타이젬에서 대국 후 자동으로 업데이트됩니다.</p>

    <p th:unless="${running}"><a class="refresh-link" href="/analysis/batch">↻ 새로고침</a></p>

    <script th:if="${userResults != null and #lists.size(userResults) > 0}">
    (function() {
        const results = userResults;

        function grade(rate) {
            if (rate >= 75) return 'S';
            if (rate >= 60) return 'A';
            if (rate >= 45) return 'B';
            if (rate >= 30) return 'C';
            return 'D';
        }
        function level(rate) {
            if (rate >= 60) return 'strong';
            if (rate >= 40) return 'normal';
            return 'weak';
        }
        function levelLabel(rate) {
            if (rate >= 60) return '강함';
            if (rate >= 40) return '보통';
            return '약함';
        }

        // 요약
        const sorted = [...results].sort((a, b) => b.matchRate - a.matchRate);
        const best = sorted[0];
        const worst = sorted[sorted.length - 1];
        const avgMatch = (results.reduce((s, r) => s + r.matchRate, 0) / results.length).toFixed(1);

        let summaryMsg = '';
        if (results.length >= 2) {
            summaryMsg = `<b>${best.phase}</b>이 가장 강하고, <b>${worst.phase}</b> 집중 개선이 필요합니다.`;
        } else {
            summaryMsg = `<b>${best.phase}</b> 구간 분석 완료 — 더 많은 기보가 쌓이면 전체 리포트가 나옵니다.`;
        }

        const root = document.getElementById('analysis-root');

        // 요약 배너
        root.innerHTML = `
        <div class="summary-banner">
            <div class="summary-item">
                <div class="summary-label">평균 일치율</div>
                <div class="summary-value" style="color:#4a90d9">${avgMatch}%</div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <div class="summary-label">가장 강한 구간</div>
                <div class="summary-value" style="color:#2ecc71">${best.phase} (${best.matchRate}%)</div>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-item">
                <div class="summary-label">집중 개선 구간</div>
                <div class="summary-value" style="color:#e74c3c">${worst.phase} (${worst.matchRate}%)</div>
            </div>
            <div class="summary-divider"></div>
            <div style="font-size:13px; color:#555; flex:1;">${summaryMsg}</div>
        </div>`;

        // 구간 카드
        const cardsHtml = results.map(r => {
            const lv = level(r.matchRate);
            const g = grade(r.matchRate);
            const fillW = Math.min(r.matchRate, 100);
            return `
            <div class="card ${lv}">
                <div class="card-header">
                    <div>
                        <div class="card-phase">${r.phase}</div>
                        <span class="badge ${lv}">${levelLabel(r.matchRate)}</span>
                    </div>
                    <div class="grade ${g}">${g}</div>
                </div>
                <div class="gauge-label"><span>카타고 일치율</span><span>${r.matchRate}%</span></div>
                <div class="gauge-track"><div class="gauge-fill fill-${lv}" style="width:${fillW}%"></div></div>
                <div class="stat-row"><span>승률 손실</span><span>${r.winRateLoss}</span></div>
                <div class="stat-row"><span>집수 손실</span><span>${r.scoreLoss}집</span></div>
            </div>`;
        }).join('');
        root.innerHTML += `<div class="cards">${cardsHtml}</div>`;

        // 레이더 차트
        root.innerHTML += `
        <div class="chart-section">
            <h2>구간별 실력 분포</h2>
            <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
        </div>`;

        // 상세 테이블
        const tableRows = results.map(r => `
            <tr>
                <td><strong>${r.phase}</strong></td>
                <td>${r.matchRate}%</td>
                <td>${r.winRateLoss}</td>
                <td>${r.scoreLoss}집</td>
                <td><span class="badge ${level(r.matchRate)}">${grade(r.matchRate)}</span></td>
            </tr>`).join('');
        root.innerHTML += `
        <div class="table-section">
            <h2>상세 수치</h2>
            <table>
                <thead><tr><th>구간</th><th>카타고 일치율</th><th>승률 손실</th><th>집수 손실</th><th>등급</th></tr></thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>`;

        // 레이더 차트 렌더
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: results.map(r => r.phase),
                datasets: [{
                    label: '카타고 일치율 (%)',
                    data: results.map(r => r.matchRate),
                    backgroundColor: 'rgba(74,144,217,0.2)',
                    borderColor: '#4a90d9',
                    borderWidth: 2,
                    pointBackgroundColor: '#4a90d9'
                }]
            },
            options: {
                scales: { r: { min: 0, max: 100, ticks: { stepSize: 25 } } },
                plugins: { legend: { display: false } }
            }
        });
    })();
    </script>
</body>
</html>
